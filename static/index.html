<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#171915">
  <title>Docfish</title>
  <link rel="stylesheet" href="/styles.css?v=17">
</head>
<body>
  <aside class="docs-sidebar">
    <div class="side-head"><img src="/anglerfish_idle.gif" alt="Docfish"></div>
    <button id="open-library" class="rail-button" type="button"><span class="rail-icon">▥</span><b>Library</b></button>
    <label class="rag-switch"><span><b>RAG mode</b><small>Answer from selected docs</small></span><input id="rag-toggle" type="checkbox"><i></i></label>
    <label class="rag-source"><span>Source</span><select id="rag-doc" aria-label="RAG documentation source"><option value="">Choose…</option></select></label>
  </aside>
  <div class="shell">
    <header>
      <a class="brand" href="/" aria-label="Docfish home"><span>Docfish</span></a>
      <div class="controls">
        <span id="status" class="status" aria-label="Model service status"><i></i><span></span></span>
        <label class="model-select"><span>Model</span><select id="model" aria-label="Choose model"><option>Loading…</option></select></label>
        <img class="header-avatar" src="/anglerfish_idle.gif" alt="Docfish">
      </div>
    </header>

    <main id="chat">
      <section id="welcome" class="welcome">
        <div class="angler-logo"><img src="/anglerfish_idle.gif" alt="Docfish"></div>
        <p class="eyebrow">DOCFISH</p>
        <h1>Docfish</h1>
      </section>
      <section id="messages" class="messages" aria-live="polite"></section>
    </main>

    <footer>
      <form id="composer">
        <textarea id="input" rows="1" placeholder="Ask Docfish a code question…" aria-label="Message" required></textarea>
        <button id="send" type="submit" aria-label="Send message"><span>↑</span></button>
      </form>
      <div class="footer-meta"><button id="clear" type="button">Reset chat · Ctrl+R</button><span>Enter to send · Shift+Enter for a new line</span></div>
    </footer>
  </div>
  <section id="library-modal" class="library-modal" hidden>
    <div class="library-panel">
      <header class="library-head"><div><p>DOCFISH LIBRARY</p><h2>Your sources</h2></div><div class="library-actions"><button id="add-source" class="index-all" type="button">Add source</button><button id="close-library" aria-label="Close library">×</button></div></header>
      <form id="source-form" class="source-form" hidden>
        <label><span>Name</span><input id="source-name" required placeholder="My programming notes"></label>
        <label class="source-path"><span>Local file or folder path</span><input id="source-path" required placeholder="/home/me/Documents/notes"></label>
        <label><span>Type</span><select id="source-kind"><option value="auto">Auto detect</option><option value="html">HTML folder</option><option value="pdf">PDF</option><option value="markdown">Markdown</option><option value="text">Text/code</option></select></label>
        <button type="submit">Inspect source</button><button id="cancel-source" type="button">Cancel</button>
        <p id="source-feedback" role="status"></p>
      </form>
      <div class="library-search"><input id="doc-search" type="search" placeholder="Search the selected book or documentation…"><button id="google-stack" type="button" title="Search Stack Overflow with Google">Search Stack Overflow ↗</button></div>
      <div class="aquarium" aria-hidden="true">
        <div class="water-light"></div><div class="seaweed weed-one"></div><div class="seaweed weed-two"></div><div class="seaweed weed-three"></div>
        <span class="bubble b1"></span><span class="bubble b2"></span><span class="bubble b3"></span><span class="bubble b4"></span>
        <span class="swimmer fish-one"></span><span class="swimmer fish-two"></span><span class="swimmer fish-three"></span><span class="sucker"></span>
      </div>
      <div class="library-body">
        <nav id="doc-list" class="doc-list" aria-label="Documentation"></nav>
        <div id="page-results" class="page-results"></div>
      </div>
    </div>
  </section>
  <section id="doc-viewer" class="doc-viewer" hidden>
    <div class="viewer-bar"><span id="viewer-title">Documentation</span><a id="open-doc" target="_blank" rel="noopener">Open tab ↗</a><button id="close-viewer" aria-label="Close documentation">×</button></div>
    <iframe id="doc-frame" title="Documentation browser"></iframe>
  </section>
  <script src="/purify.min.js"></script>
  <script src="/marked.umd.js"></script>
  <script src="/app.js?v=17"></script>
</body>
</html>
