services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: angler-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - ./Documentation/qdrant-server:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "</dev/tcp/127.0.0.1/6333"]
      interval: 5s
      timeout: 3s
      retries: 20

  angler:
    build: .
    container_name: angler-app
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
    network_mode: host
    environment:
      OLLAMA_HOST: http://127.0.0.1:11434
      QDRANT_URL: http://127.0.0.1:6333
      VECTOR_BACKEND: qdrant
      AUTO_INDEX: "1"
    volumes:
      - ./Documentation:/app/Documentation
      - embedding-cache:/root/.cache/huggingface

volumes:
  embedding-cache:
